<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="AMCO">
<title>AMCO Quarry</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F2F2F7; --card:#FFFFFF; --accent:#B8860B; --accent-bg:#FFF8E8;
    --text:#000000; --text2:#3C3C43; --text3:#8E8E93;
    --sep:#C6C6C8; --sep-light:#E5E5EA;
    --blue:#007AFF; --green:#34C759; --orange:#FF9500; --red:#FF3B30;
    --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    --r:16px; --r-sm:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--text);-webkit-font-smoothing:antialiased;}
  .app{max-width:430px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;}

  /* HEADER */
  .header{background:rgba(242,242,247,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:56px 20px 0;position:sticky;top:0;z-index:20;border-bottom:0.5px solid var(--sep);}
  .header-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;}
  .brand{display:flex;align-items:center;gap:11px;}
  .brand-mark{width:40px;height:40px;border-radius:10px;background:linear-gradient(145deg,#D4A843,#A07828);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:white;letter-spacing:0.5px;box-shadow:0 2px 8px rgba(160,120,40,0.3);}
  .brand-name{font-size:20px;font-weight:700;letter-spacing:-0.3px;}
  .brand-sub{font-size:11px;color:var(--text3);margin-top:1px;}
  .date-pill{font-size:12px;font-weight:500;color:var(--text3);background:var(--card);border:0.5px solid var(--sep);padding:5px 11px;border-radius:20px;}

  /* SEGMENTED */
  .seg-wrap{padding:0 0 12px;}
  .seg{display:flex;background:rgba(118,118,128,0.12);border-radius:9px;padding:2px;gap:2px;}
  .seg-btn{flex:1;padding:7px 4px;text-align:center;font-size:13px;font-weight:500;color:var(--text2);border-radius:7px;cursor:pointer;border:none;background:none;transition:all 0.18s;font-family:var(--font);}
  .seg-btn.active{background:var(--card);color:var(--text);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,0.12),0 0.5px 1px rgba(0,0,0,0.08);}

  /* CONTENT */
  .content{flex:1;padding:20px 16px 60px;overflow-y:auto;}

  /* SECTIONS */
  .section{margin-bottom:20px;}
  .section-label{font-size:13px;color:var(--text3);text-transform:uppercase;letter-spacing:0.4px;padding:0 16px;margin-bottom:6px;}
  .group{background:var(--card);border-radius:var(--r);overflow:hidden;}
  .group-row{display:flex;align-items:center;padding:0 16px;min-height:52px;gap:12px;border-bottom:0.5px solid var(--sep-light);}
  .group-row:last-child{border-bottom:none;}
  .row-label{font-size:15px;color:var(--text);min-width:100px;flex-shrink:0;}
  .row-input{flex:1;font-size:15px;color:var(--text2);background:none;border:none;outline:none;font-family:var(--font);text-align:right;padding:14px 0;}
  .row-input::placeholder{color:var(--text3);}

  /* MATERIAL */
  .mat-group{background:var(--card);border-radius:var(--r);padding:14px;display:flex;gap:8px;}
  .mat-pill{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:11px 6px;border-radius:var(--r-sm);border:1.5px solid var(--sep-light);background:var(--bg);cursor:pointer;transition:all 0.15s;user-select:none;}
  .mat-pill-icon{font-size:20px;}
  .mat-pill-label{font-size:11px;font-weight:600;color:var(--text3);text-align:center;line-height:1.3;}
  .mat-pill.active{border-color:var(--accent);background:var(--accent-bg);}
  .mat-pill.active .mat-pill-label{color:var(--accent);}

  /* QUANTITY */
  .qty-group{background:var(--card);border-radius:var(--r);overflow:hidden;}
  .qty-main{display:flex;align-items:center;padding:12px 16px;gap:12px;border-bottom:0.5px solid var(--sep-light);}
  .qty-btn{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:var(--sep-light);border:none;font-size:22px;color:var(--blue);display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;transition:all 0.1s;font-family:var(--font);}
  .qty-btn:active{background:var(--sep);transform:scale(0.93);}
  .qty-val{flex:1;text-align:center;font-size:28px;font-weight:700;color:var(--text);background:none;border:none;outline:none;font-family:var(--font);}
  .unit-row{display:flex;}
  .unit-opt{flex:1;padding:12px 0;text-align:center;font-size:15px;font-weight:500;color:var(--text3);cursor:pointer;user-select:none;border-right:0.5px solid var(--sep-light);transition:color 0.15s;}
  .unit-opt:last-child{border-right:none;}
  .unit-opt.active{color:var(--blue);font-weight:600;}

  /* AMOUNT */
  .amount-row{display:flex;align-items:center;padding:0 16px;min-height:52px;gap:8px;}
  .amount-label{font-size:15px;color:var(--text);min-width:100px;flex-shrink:0;}
  .rupee{font-size:15px;color:var(--text3);}
  .amount-input{flex:1;font-size:15px;font-weight:500;color:var(--text);background:none;border:none;outline:none;font-family:var(--font);text-align:right;padding:14px 0;}
  .amount-input::placeholder{color:var(--text3);font-weight:400;}

  /* SAVE */
  .save-btn{width:100%;padding:16px;background:var(--blue);color:white;border:none;border-radius:var(--r);font-family:var(--font);font-size:17px;font-weight:600;cursor:pointer;transition:all 0.15s;margin-top:8px;}
  .save-btn:active{transform:scale(0.98);background:#0065D1;}
  .save-btn:disabled{background:var(--sep);color:var(--text3);}

  /* TOAST */
  .toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(90px);padding:12px 22px;border-radius:40px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;z-index:200;box-shadow:0 4px 24px rgba(0,0,0,0.18);}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .toast.ok{background:#1C1C1E;color:white;}
  .toast.err{background:var(--red);color:white;}

  /* LIST HEADER */
  .list-hdr{display:flex;align-items:center;justify-content:space-between;padding:0 4px;margin-bottom:8px;}
  .list-title{font-size:13px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;}
  .list-badge{font-size:12px;color:var(--text3);background:var(--card);border:0.5px solid var(--sep);padding:3px 9px;border-radius:20px;}

  /* ENTRY CARDS */
  .entry-card{background:var(--card);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
  .entry-main{padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:0.5px solid var(--sep-light);}
  .entry-vendor{font-size:16px;font-weight:600;}
  .entry-time{font-size:12px;color:var(--text3);margin-top:2px;}
  .entry-qty-pill{background:var(--accent-bg);color:var(--accent);font-size:13px;font-weight:700;padding:5px 12px;border-radius:20px;border:1px solid rgba(184,134,11,0.25);white-space:nowrap;flex-shrink:0;margin-left:8px;}
  .entry-meta{padding:10px 16px;display:flex;gap:6px;flex-wrap:wrap;}
  .etag{font-size:12px;font-weight:500;padding:4px 10px;border-radius:20px;}
  .etag-default{background:var(--bg);color:var(--text3);}
  .etag-20mm{background:#FFF8E8;color:#A07828;}
  .etag-msand{background:#EBF4FF;color:#0055BB;}
  .etag-wsand{background:#EAFAF2;color:#1A7A45;}
  .entry-amount-row{padding:10px 16px;border-top:0.5px solid var(--sep-light);display:flex;justify-content:space-between;align-items:center;}
  .entry-amount-label{font-size:14px;color:var(--text3);}
  .entry-amount-val{font-size:15px;font-weight:700;color:var(--text);}
  .entry-actions{display:flex;border-top:0.5px solid var(--sep-light);}
  .action-btn{flex:1;padding:12px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;border:none;background:none;border-right:0.5px solid var(--sep-light);font-family:var(--font);}
  .action-btn:last-child{border-right:none;}
  .action-edit{color:var(--blue);}
  .action-delete{color:var(--red);}

  /* CUSTOMERS */
  .customer-card{background:var(--card);border-radius:var(--r);margin-bottom:10px;display:flex;align-items:center;padding:16px;gap:14px;cursor:pointer;}
  .customer-card:active{background:var(--sep-light);}
  .customer-avatar{width:44px;height:44px;border-radius:50%;background:var(--accent-bg);border:1.5px solid rgba(184,134,11,0.25);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--accent);flex-shrink:0;}
  .customer-info{flex:1;min-width:0;}
  .customer-name{font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .customer-meta{font-size:13px;color:var(--text3);margin-top:2px;}
  .customer-right{text-align:right;flex-shrink:0;}
  .customer-amt{font-size:15px;font-weight:700;}
  .customer-loads{font-size:12px;color:var(--text3);margin-top:2px;}
  .chevron{color:var(--sep);font-size:20px;margin-left:4px;flex-shrink:0;}

  /* DETAIL */
  .detail-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
  .back-btn{font-size:17px;font-weight:600;color:var(--blue);cursor:pointer;background:none;border:none;font-family:var(--font);padding:0;display:flex;align-items:center;gap:2px;}
  .detail-title{font-size:18px;font-weight:700;}
  .detail-stats{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  .ds-item{text-align:center;}
  .ds-num{font-size:22px;font-weight:700;}
  .ds-num.gold{color:var(--accent);}
  .ds-num.green{color:var(--green);}
  .ds-label{font-size:11px;color:var(--text3);margin-top:3px;font-weight:500;text-transform:uppercase;letter-spacing:0.4px;}
  .total-bar{background:var(--card);border-radius:var(--r);padding:16px 20px;margin-top:12px;display:flex;justify-content:space-between;align-items:center;}
  .total-bar-label{font-size:15px;font-weight:600;color:var(--text2);}
  .total-bar-val{font-size:22px;font-weight:800;}

  /* EDIT MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;}
  .modal-overlay.show{opacity:1;pointer-events:all;}
  .modal{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:430px;padding:20px 16px 40px;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.34,1.2,0.64,1);max-height:90vh;overflow-y:auto;}
  .modal-overlay.show .modal{transform:translateY(0);}
  .modal-handle{width:36px;height:4px;background:var(--sep);border-radius:2px;margin:0 auto 20px;}
  .modal-title{font-size:17px;font-weight:700;text-align:center;margin-bottom:20px;}
  .modal-actions{display:flex;gap:10px;margin-top:12px;}
  .modal-cancel{flex:1;padding:14px;background:var(--sep-light);color:var(--text2);border:none;border-radius:var(--r-sm);font-family:var(--font);font-size:16px;font-weight:600;cursor:pointer;}
  .modal-save{flex:1;padding:14px;background:var(--blue);color:white;border:none;border-radius:var(--r-sm);font-family:var(--font);font-size:16px;font-weight:600;cursor:pointer;}

  .empty{text-align:center;padding:60px 24px;color:var(--text3);}
  .empty-icon{font-size:44px;margin-bottom:14px;opacity:0.4;}
  .empty-text{font-size:14px;line-height:1.6;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="brand">
        <div class="brand-mark">AM</div>
        <div>
          <div class="brand-name">AMCO</div>
          <div class="brand-sub">Quarry Operations</div>
        </div>
      </div>
      <div class="date-pill" id="dateBadge"></div>
    </div>
    <div class="seg-wrap">
      <div class="seg">
        <button class="seg-btn active" onclick="switchTab('log')">Log</button>
        <button class="seg-btn" onclick="switchTab('history')">History</button>
        <button class="seg-btn" onclick="switchTab('customers')">Customers</button>
      </div>
    </div>
  </div>

  <div class="content">

    <!-- LOG TAB -->
    <div id="tab-log">
      <div class="section">
        <div class="section-label">Details</div>
        <div class="group">
          <div class="group-row">
            <span class="row-label">Vendor</span>
            <input class="row-input" type="text" id="vendor" placeholder="Contractor name" autocomplete="off" list="vendorList">
            <datalist id="vendorList"></datalist>
          </div>
          <div class="group-row">
            <span class="row-label">Driver</span>
            <input class="row-input" type="text" id="driver" placeholder="Driver name" autocomplete="off" list="driverList">
            <datalist id="driverList"></datalist>
          </div>
          <div class="group-row">
            <span class="row-label">Notes</span>
            <input class="row-input" type="text" id="notes" placeholder="Optional" autocomplete="off">
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Material</div>
        <div class="mat-group">
          <div class="mat-pill active" id="mat-20mm" onclick="selectMat('20mm')">
            <span class="mat-pill-icon">🪨</span>
            <span class="mat-pill-label">20mm</span>
          </div>
          <div class="mat-pill" id="mat-msand" onclick="selectMat('M-Sand')">
            <span class="mat-pill-icon">🏖️</span>
            <span class="mat-pill-label">M-Sand</span>
          </div>
          <div class="mat-pill" id="mat-wsand" onclick="selectMat('Washed Sand')">
            <span class="mat-pill-icon">💧</span>
            <span class="mat-pill-label">Washed Sand</span>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Quantity</div>
        <div class="qty-group">
          <div class="qty-main">
            <button class="qty-btn" onclick="changeQty(-1)">−</button>
            <input class="qty-val" type="number" id="qty" value="1" min="0.5" step="0.5">
            <button class="qty-btn" onclick="changeQty(1)">+</button>
          </div>
          <div class="unit-row">
            <div class="unit-opt active" id="unit-brass" onclick="selectUnit('Brass')">Brass</div>
            <div class="unit-opt" id="unit-tons" onclick="selectUnit('Tons')">Tons</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Payment</div>
        <div class="group">
          <div class="amount-row">
            <span class="amount-label">Amount</span>
            <span class="rupee">₹</span>
            <input class="amount-input" type="number" id="amount" placeholder="0.00" min="0" step="0.01">
          </div>
        </div>
      </div>

      <button class="save-btn" id="saveBtn" onclick="submitEntry()">Save Entry</button>
    </div>

    <!-- HISTORY TAB -->
    <div id="tab-history" style="display:none">
      <div class="list-hdr">
        <div class="list-title">All Entries</div>
        <div class="list-badge" id="entryCount">0 entries</div>
      </div>
      <div id="historyList"></div>
    </div>

    <!-- CUSTOMERS TAB -->
    <div id="tab-customers" style="display:none">
      <div id="customerList"></div>
      <div id="customerDetail" style="display:none"></div>
    </div>

  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal" onclick="handleModalClick(event)">
  <div class="modal" id="modalInner">
    <div class="modal-handle"></div>
    <div class="modal-title">Edit Entry</div>

    <div class="section" style="margin-bottom:12px">
      <div class="group">
        <div class="group-row">
          <span class="row-label">Vendor</span>
          <input class="row-input" type="text" id="e-vendor" placeholder="Contractor name">
        </div>
        <div class="group-row">
          <span class="row-label">Driver</span>
          <input class="row-input" type="text" id="e-driver" placeholder="Driver name">
        </div>
        <div class="group-row">
          <span class="row-label">Notes</span>
          <input class="row-input" type="text" id="e-notes" placeholder="Optional">
        </div>
      </div>
    </div>

    <div class="section" style="margin-bottom:12px">
      <div class="section-label">Material</div>
      <div class="mat-group">
        <div class="mat-pill active" id="e-mat-20mm" onclick="editSelectMat('20mm')">
          <span class="mat-pill-icon">🪨</span><span class="mat-pill-label">20mm</span>
        </div>
        <div class="mat-pill" id="e-mat-msand" onclick="editSelectMat('M-Sand')">
          <span class="mat-pill-icon">🏖️</span><span class="mat-pill-label">M-Sand</span>
        </div>
        <div class="mat-pill" id="e-mat-wsand" onclick="editSelectMat('Washed Sand')">
          <span class="mat-pill-icon">💧</span><span class="mat-pill-label">Washed Sand</span>
        </div>
      </div>
    </div>

    <div class="section" style="margin-bottom:12px">
      <div class="section-label">Quantity</div>
      <div class="qty-group">
        <div class="qty-main">
          <button class="qty-btn" onclick="editChangeQty(-1)">−</button>
          <input class="qty-val" type="number" id="e-qty" value="1" min="0.5" step="0.5">
          <button class="qty-btn" onclick="editChangeQty(1)">+</button>
        </div>
        <div class="unit-row">
          <div class="unit-opt active" id="e-unit-brass" onclick="editSelectUnit('Brass')">Brass</div>
          <div class="unit-opt" id="e-unit-tons" onclick="editSelectUnit('Tons')">Tons</div>
        </div>
      </div>
    </div>

    <div class="section" style="margin-bottom:12px">
      <div class="section-label">Payment</div>
      <div class="group">
        <div class="amount-row">
          <span class="amount-label">Amount</span>
          <span class="rupee">₹</span>
          <input class="amount-input" type="number" id="e-amount" placeholder="0.00" min="0" step="0.01">
        </div>
      </div>
    </div>

    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeEdit()">Cancel</button>
      <button class="modal-save" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <span id="toastIcon">✓</span>&nbsp;<span id="toastMsg">Saved</span>
</div>

<script>
function sendToSheet(data, cb) {
  var params = 'vendor=' + encodeURIComponent(data.vendor)
    + '&driver=' + encodeURIComponent(data.driver)
    + '&material=' + encodeURIComponent(data.material)
    + '&quantity=' + encodeURIComponent(data.quantity)
    + '&unit=' + encodeURIComponent(data.unit)
    + '&amount=' + encodeURIComponent(data.amount || 0)
    + '&notes=' + encodeURIComponent(data.notes || '')
    + '&timestamp=' + encodeURIComponent(data.timestamp);

  var img = new Image();
  img.onload = img.onerror = function() { cb(true); };
  img.src = SCRIPT_URL + '?' + params;

  // Also try fetch as backup
  fetch(SCRIPT_URL + '?' + params, { method: 'GET', mode: 'no-cors' }).catch(function(){});
  setTimeout(function(){ cb(true); }, 2000);
}

var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzZ2zCHDxUiOQJky2ZOjrmqg2KIuq7NMO94x1-V08rHRNkaCEMoz-5ICwGBzIiKdvC9/exec';

var selMat = '20mm';
var selUnit = 'Brass';
var editMat = '20mm';
var editUnit = 'Brass';
var editIdx = -1;
var entries = [];

function loadFromSheet() {
  // Remove old callback if exists
  var old = document.getElementById('jsonp-script');
  if (old) old.parentNode.removeChild(old);

  window.amcoCallback = function(data) {
    if (data.status === 'ok' && data.entries) {
      entries = data.entries;
      refreshSuggestions();
      // Refresh current tab if on history or customers
      var active = document.querySelector('.seg-btn.active');
      if (active) {
        var txt = active.textContent.trim().toLowerCase();
        if (txt === 'history') renderHistory();
        if (txt === 'customers') renderCustomers();
      }
    }
  };

  var s = document.createElement('script');
  s.id = 'jsonp-script';
  s.src = SCRIPT_URL + '?callback=amcoCallback';
  document.body.appendChild(s);
}

document.getElementById('dateBadge').textContent = new Date().toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'});
localStorage.removeItem('amcoEntries');
refreshSuggestions();
loadFromSheet();

function refreshSuggestions() {
  var vendors = [];
  var drivers = [];
  for (var i = 0; i < entries.length; i++) {
    if (vendors.indexOf(entries[i].vendor) === -1) vendors.push(entries[i].vendor);
    if (drivers.indexOf(entries[i].driver) === -1) drivers.push(entries[i].driver);
  }
  var vl = document.getElementById('vendorList');
  var dl = document.getElementById('driverList');
  if (vl) vl.innerHTML = vendors.map(function(v){return '<option value="'+v+'">';}).join('');
  if (dl) dl.innerHTML = drivers.map(function(d){return '<option value="'+d+'">';}).join('');
}

function switchTab(t) {
  var tabs = ['log','history','customers'];
  for (var i = 0; i < tabs.length; i++) {
    document.getElementById('tab-'+tabs[i]).style.display = tabs[i]===t ? 'block' : 'none';
  }
  var btns = document.querySelectorAll('.seg-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].className = 'seg-btn' + (tabs[i]===t ? ' active' : '');
  }
  if (t==='history') renderHistory();
  if (t==='customers') renderCustomers();
}

function matIdFromName(m) {
  if (m==='20mm') return '20mm';
  if (m==='M-Sand') return 'msand';
  return 'wsand';
}

function selectMat(m) {
  selMat = m;
  var ids = ['20mm','msand','wsand'];
  for (var i=0; i<ids.length; i++) {
    document.getElementById('mat-'+ids[i]).className = 'mat-pill';
  }
  document.getElementById('mat-'+matIdFromName(m)).className = 'mat-pill active';
}

function selectUnit(u) {
  selUnit = u;
  document.getElementById('unit-brass').className = 'unit-opt' + (u==='Brass'?' active':'');
  document.getElementById('unit-tons').className = 'unit-opt' + (u==='Tons'?' active':'');
}

function changeQty(d) {
  var el = document.getElementById('qty');
  var v = parseFloat(el.value) || 1;
  el.value = Math.max(0.5, Math.round((v + d*0.5)*10)/10);
}

function showToast(msg, ok) {
  if (ok === undefined) ok = true;
  var t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toastIcon').textContent = ok ? '✓' : '!';
  t.className = 'toast show ' + (ok ? 'ok' : 'err');
  setTimeout(function(){ t.className = 'toast ' + (ok ? 'ok' : 'err'); }, 2600);
}

function submitEntry() {
  var vendor = document.getElementById('vendor').value.trim();
  var driver = document.getElementById('driver').value.trim();
  var qty = parseFloat(document.getElementById('qty').value);
  var notes = document.getElementById('notes').value.trim();
  var amount = parseFloat(document.getElementById('amount').value) || 0;

  if (!vendor) { showToast('Enter vendor name', false); return; }
  if (!driver) { showToast('Enter driver name', false); return; }
  if (!qty || qty <= 0) { showToast('Enter valid quantity', false); return; }

  var entry = {
    id: Date.now(),
    timestamp: new Date().toLocaleString('en-IN'),
    vendor: vendor, driver: driver,
    material: selMat, quantity: qty, unit: selUnit,
    notes: notes, amount: amount
  };

  entries.unshift(entry);
  refreshSuggestions();

  var btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  sendToSheet(entry, function(ok) {
    showToast(ok ? 'Saved to sheet ✓' : 'Saved locally ✓');
    btn.disabled = false;
    btn.textContent = 'Save Entry';
  });

  document.getElementById('vendor').value = '';
  document.getElementById('driver').value = '';
  document.getElementById('qty').value = 1;
  document.getElementById('notes').value = '';
  document.getElementById('amount').value = '';
  selectMat('20mm');
  selectUnit('Brass');
}

function tagClass(m) {
  if (m==='20mm') return 'etag-20mm';
  if (m==='M-Sand') return 'etag-msand';
  return 'etag-wsand';
}

function fmt(n) {
  return n > 0 ? '₹' + Number(n).toLocaleString('en-IN') : '—';
}

function initials(name) {
  var parts = name.trim().split(' ');
  var result = '';
  for (var i=0; i<Math.min(parts.length,2); i++) {
    if (parts[i].length > 0) result += parts[i][0].toUpperCase();
  }
  return result || '?';
}

/* HISTORY */
function renderHistory() {
  var el = document.getElementById('historyList');
  document.getElementById('entryCount').textContent = entries.length + ' entries';
  if (!entries.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">No entries yet.<br>Log your first load!</div></div>';
    return;
  }
  var html = '';
  for (var i=0; i<entries.length; i++) {
    var e = entries[i];
    html += '<div class="entry-card">';
    html += '<div class="entry-main">';
    html += '<div><div class="entry-vendor">'+e.vendor+'</div><div class="entry-time">'+e.timestamp+'</div></div>';
    html += '<div class="entry-qty-pill">'+e.quantity+' '+e.unit+'</div>';
    html += '</div>';
    html += '<div class="entry-meta">';
    html += '<span class="etag '+tagClass(e.material)+'">'+e.material+'</span>';
    html += '<span class="etag etag-default">🚗 '+e.driver+'</span>';
    if (e.notes) html += '<span class="etag etag-default">'+e.notes+'</span>';
    html += '</div>';
    if (e.amount > 0) {
      html += '<div class="entry-amount-row"><span class="entry-amount-label">Amount</span><span class="entry-amount-val">'+fmt(e.amount)+'</span></div>';
    }
    html += '<div class="entry-actions">';
    html += '<button class="action-btn action-edit" onclick="openEdit('+i+')">✏️ Edit</button>';
    html += '<button class="action-btn action-delete" onclick="deleteEntry('+i+')">🗑 Delete</button>';
    html += '</div></div>';
  }
  el.innerHTML = html;
}

function deleteEntry(i) {
  if (!confirm('Delete this entry?')) return;
  var entry = entries[i];
  entries.splice(i, 1);
  renderHistory();
  showToast('Deleting...');

  // Delete from sheet via JSONP
  var old = document.getElementById('jsonp-delete');
  if (old) old.parentNode.removeChild(old);

  window.amcoDeleteCallback = function(data) {
    if (data.status === 'deleted') {
      showToast('Entry deleted ✓');
    } else {
      showToast('Deleted locally only', false);
    }
  };

  var s = document.createElement('script');
  s.id = 'jsonp-delete';
  s.src = SCRIPT_URL + '?action=delete&timestamp=' + encodeURIComponent(entry.timestamp) + '&callback=amcoDeleteCallback';
  document.body.appendChild(s);
}

/* EDIT */
function openEdit(i) {
  editIdx = i;
  var e = entries[i];
  document.getElementById('e-vendor').value = e.vendor;
  document.getElementById('e-driver').value = e.driver;
  document.getElementById('e-notes').value = e.notes || '';
  document.getElementById('e-qty').value = e.quantity;
  document.getElementById('e-amount').value = e.amount || '';
  editSelectMat(e.material);
  editSelectUnit(e.unit);
  document.getElementById('editModal').className = 'modal-overlay show';
}

function closeEdit() {
  document.getElementById('editModal').className = 'modal-overlay';
  editIdx = -1;
}

function handleModalClick(ev) {
  if (ev.target === document.getElementById('editModal')) closeEdit();
}

function editSelectMat(m) {
  editMat = m;
  var ids = ['20mm','msand','wsand'];
  for (var i=0; i<ids.length; i++) {
    document.getElementById('e-mat-'+ids[i]).className = 'mat-pill';
  }
  document.getElementById('e-mat-'+matIdFromName(m)).className = 'mat-pill active';
}

function editSelectUnit(u) {
  editUnit = u;
  document.getElementById('e-unit-brass').className = 'unit-opt' + (u==='Brass'?' active':'');
  document.getElementById('e-unit-tons').className = 'unit-opt' + (u==='Tons'?' active':'');
}

function editChangeQty(d) {
  var el = document.getElementById('e-qty');
  var v = parseFloat(el.value) || 1;
  el.value = Math.max(0.5, Math.round((v + d*0.5)*10)/10);
}

function saveEdit() {
  if (editIdx < 0) return;
  var e = entries[editIdx];
  e.vendor = document.getElementById('e-vendor').value.trim() || e.vendor;
  e.driver = document.getElementById('e-driver').value.trim() || e.driver;
  e.notes = document.getElementById('e-notes').value.trim();
  e.quantity = parseFloat(document.getElementById('e-qty').value) || e.quantity;
  e.amount = parseFloat(document.getElementById('e-amount').value) || 0;
  e.material = editMat;
  e.unit = editUnit;
  closeEdit();
  renderHistory();
  showToast('Entry updated ✓');
}

/* CUSTOMERS */
function renderCustomers() {
  document.getElementById('customerList').style.display = 'block';
  document.getElementById('customerDetail').style.display = 'none';

  var byVendor = {};
  for (var i=0; i<entries.length; i++) {
    var e = entries[i];
    if (!byVendor[e.vendor]) byVendor[e.vendor] = {loads:0, totalQty:0, totalAmt:0, materials:[]};
    byVendor[e.vendor].loads++;
    byVendor[e.vendor].totalQty += e.quantity;
    byVendor[e.vendor].totalAmt += (e.amount || 0);
    if (byVendor[e.vendor].materials.indexOf(e.material) === -1) {
      byVendor[e.vendor].materials.push(e.material);
    }
  }

  var cl = document.getElementById('customerList');
  var names = Object.keys(byVendor);

  if (!names.length) {
    cl.innerHTML = '<div class="empty"><div class="empty-icon">👥</div><div class="empty-text">No customers yet.<br>Log your first entry!</div></div>';
    return;
  }

  names.sort(function(a,b){ return byVendor[b].totalAmt - byVendor[a].totalAmt; });

  var html = '<div class="list-hdr" style="margin-bottom:12px"><div class="list-title">All Customers</div><div class="list-badge">'+names.length+' vendors</div></div>';
  for (var i=0; i<names.length; i++) {
    var v = names[i];
    var d = byVendor[v];
    var safeV = v.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    html += '<div class="customer-card" onclick="showCustomerDetail(\''+safeV+'\')">';
    html += '<div class="customer-avatar">'+initials(v)+'</div>';
    html += '<div class="customer-info"><div class="customer-name">'+v+'</div><div class="customer-meta">'+d.loads+' trips · '+d.materials.join(', ')+'</div></div>';
    html += '<div class="customer-right"><div class="customer-amt">'+(d.totalAmt>0?fmt(d.totalAmt):'—')+'</div><div class="customer-loads">'+d.totalQty+' qty</div></div>';
    html += '<div class="chevron">›</div></div>';
  }
  cl.innerHTML = html;
}

function showCustomerDetail(vendor) {
  var vendorEntries = [];
  for (var i=0; i<entries.length; i++) {
    if (entries[i].vendor === vendor) vendorEntries.push(entries[i]);
  }
  var totalAmt = 0, totalQty = 0;
  for (var i=0; i<vendorEntries.length; i++) {
    totalAmt += (vendorEntries[i].amount || 0);
    totalQty += vendorEntries[i].quantity;
  }
  var loads = vendorEntries.length;

  document.getElementById('customerList').style.display = 'none';
  var detail = document.getElementById('customerDetail');
  detail.style.display = 'block';

  var html = '';
  html += '<div class="detail-header"><button class="back-btn" onclick="renderCustomers()">‹ Back</button><div class="detail-title">'+vendor+'</div></div>';
  html += '<div class="detail-stats">';
  html += '<div class="ds-item"><div class="ds-num">'+loads+'</div><div class="ds-label">Trips</div></div>';
  html += '<div class="ds-item"><div class="ds-num gold">'+totalQty+'</div><div class="ds-label">Total Qty</div></div>';
  html += '<div class="ds-item"><div class="ds-num green">'+(totalAmt>0?'₹'+Math.round(totalAmt).toLocaleString('en-IN'):'—')+'</div><div class="ds-label">Amount</div></div>';
  html += '</div>';
  html += '<div class="list-hdr"><div class="list-title">All Trips</div><div class="list-badge">'+loads+' entries</div></div>';

  for (var i=0; i<vendorEntries.length; i++) {
    var e = vendorEntries[i];
    html += '<div class="entry-card">';
    html += '<div class="entry-main"><div><div class="entry-vendor" style="font-size:14px;font-weight:500">'+e.timestamp+'</div><div class="entry-time">🚗 '+e.driver+'</div></div>';
    html += '<div class="entry-qty-pill">'+e.quantity+' '+e.unit+'</div></div>';
    html += '<div class="entry-meta"><span class="etag '+tagClass(e.material)+'">'+e.material+'</span>';
    if (e.notes) html += '<span class="etag etag-default">'+e.notes+'</span>';
    html += '</div>';
    if (e.amount>0) html += '<div class="entry-amount-row"><span class="entry-amount-label">Amount</span><span class="entry-amount-val">'+fmt(e.amount)+'</span></div>';
    html += '</div>';
  }

  html += '<div class="total-bar"><div class="total-bar-label">Total Amount</div><div class="total-bar-val">'+(totalAmt>0?fmt(totalAmt):'—')+'</div></div>';
  detail.innerHTML = html;
}
</script>
